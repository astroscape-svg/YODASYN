<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YODASYN v1.1.2</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .panel { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; width: 95%; max-width: 950px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .section { background: #0d1117; padding: 12px; border-radius: 8px; border: 1px solid #30363d; }
        h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: #79c0ff; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #79c0ff; cursor: pointer; }
        select { width: 100%; background: #010409; color: #c9d1d9; border: 1px solid #30363d; padding: 5px; border-radius: 6px; font-size: 0.8rem; }
        canvas { background: #010409; width: 100%; height: 80px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #30363d; }
        .keyboard { display: flex; justify-content: center; overflow-x: auto; padding-bottom: 15px; }
        .key { width: 40px; height: 120px; background: #f0f6fc; border: 1px solid #30363d; border-radius: 0 0 6px 6px; flex-shrink: 0; }
        .key.black { width: 28px; height: 80px; background: #161b22; margin-left: -14px; margin-right: -14px; z-index: 2; border: 1px solid #000; }
        .key.active { background: #79c0ff !important; }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #79c0ff; cursor: pointer; font-weight: bold; }
        .osc-label { color: #58a6ff; font-weight: bold; font-size: 0.8rem; margin-bottom: 8px; display: block; }
        #midi-status { font-size: 0.7rem; color: #58a6ff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="color: #79c0ff; font-weight: 300; letter-spacing: 4px; margin: 10px 0;">YODASYN v1.1.2</h1>
    <div id="midi-status">MIDI: Ready (Tap to Start)</div>

    <div class="panel">
        <canvas id="scope"></canvas>

            <div class="section">
