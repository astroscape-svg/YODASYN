<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YODASYN v1.1.1</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .panel { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; width: 95%; max-width: 950px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .section { background: #0d1117; padding: 12px; border-radius: 8px; border: 1px solid #30363d; }
        h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: #79c0ff; border-bottom: 1px solid #30363d; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #79c0ff; cursor: pointer; }
        select { width: 100%; background: #010409; color: #c9d1d9; border: 1px solid #30363d; padding: 5px; border-radius: 6px; font-size: 0.8rem; }
        canvas { background: #010409; width: 100%; height: 80px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #30363d; }
        .keyboard { display: flex; justify-content: center; overflow-x: auto; padding-bottom: 15px; }
        .key { width: 40px; height: 120px; background: #f0f6fc; border: 1px solid #30363d; border-radius: 0 0 6px 6px; flex-shrink: 0; }
        .key.black { width: 28px; height: 80px; background: #161b22; margin-left: -14px; margin-right: -14px; z-index: 2; border: 1px solid #000; }
        .key.active { background: #79c0ff !important; }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #79c0ff; cursor: pointer; font-weight: bold; }
        .osc-label { color: #58a6ff; font-weight: bold; font-size: 0.8rem; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <h1 style="color: #79c0ff; font-weight: 300; letter-spacing: 4px; margin: 10px 0;">YODASYN v1.1.1</h1>

    <div class="panel">
        <canvas id="scope"></canvas>

        <div class="grid">
            <div class="section">
                <h3>Oscillators</h3>
                <span class="osc-label">OSC 1</span>
                <select id="wave1"><option value="sawtooth">Sawtooth</option><option value="square">Square</option><option value="triangle">Triangle</option></select>
                <input type="range" id="mix1" min="0" max="1" step="0.01" value="0.4">
                
                <span class="osc-label" style="margin-top:10px;">OSC 2</span>
                <select id="wave2"><option value="square">Square</option><option value="sawtooth">Sawtooth</option></select>
                <input type="range" id="mix2" min="0" max="1" step="0.01" value="0.2">
            </div>

            <div class="section">
                <h3>Performance</h3>
                <label class="toggle-label" style="margin-bottom:15px;"><input type="checkbox" id="holdMode"> HOLD</label>
                <label class="toggle-label"><input type="checkbox" id="arpActive"> ARPEGGIATOR</label>
                <div class="control-group" style="margin-top:10px;">
                    <label>BPM</label>
                    <input type="range" id="arpBpm" min="40" max="240" value="120">
                </div>
                <select id="arpMode"><option value="up">Up</option><option value="down">Down</option><option value="random">Random</option></select>
            </div>

            <div class="section">
                <h3>Filter & Env</h3>
                <label>Cutoff</label>
                <input type="range" id="cutoff" min="40" max="10000" value="2500">
                <label>Release</label>
                <input type="range" id="release" min="0.1" max="4" step="0.1" value="0.8">
            </div>

            <div class="section">
                <h3>Delay FX</h3>
                <input type="range" id="delayTime" min="0" max="1" step="0.01" value="0.3">
                <label>Feedback</label>
                <input type="range" id="delayFb" min="0" max="0.8" step="0.01" value="0.4">
                <label>Mix</label>
                <input type="range" id="delayMix" min="0" max="0.8" step="0.01" value="0.2">
            </div>
        </div>

        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        let audioCtx, masterGain, filter, analyser, delayNode, delayGain, feedbackGain;
        const activeVoices = new Map();
        const heldNotes = new Set();
        let arpTimer = null;
        let arpIndex = 0;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            filter = audioCtx.createBiquadFilter(); filter.type = "lowpass";
            delayNode = audioCtx.createDelay(1.0); feedbackGain = audioCtx.createGain(); delayGain = audioCtx.createGain();
            masterGain = audioCtx.createGain(); analyser = audioCtx.createAnalyser();
            filter.connect(masterGain); filter.connect(delayNode);
            delayNode.connect(feedbackGain); feedbackGain.connect(delayNode);
            delayNode.connect(delayGain); delayGain.connect(masterGain);
            masterGain.connect(analyser); analyser.connect(audioCtx.destination);
            updateParams(); drawScope();
        }

        function updateParams() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            filter.frequency.setTargetAtTime(document.getElementById('cutoff').value, now, 0.05);
            delayNode.delayTime.setTargetAtTime(document.getElementById('delayTime').value, now, 0.05);
            feedbackGain.gain.setTargetAtTime(document.getElementById('delayFb').value, now, 0.05);
            delayGain.gain.setTargetAtTime(document.getElementById('delayMix').value, now, 0.05);
            masterGain.gain.setTargetAtTime(0.5, now, 0.05);
            if(document.getElementById('arpActive').checked) startArp(); else stopArp();
        }

        class Voice {
            constructor(freq) {
                const now = audioCtx.currentTime;
                this.o1 = audioCtx.createOscillator(); this.o2 = audioCtx.createOscillator();
                this.g1 = audioCtx.createGain(); this.g2 = audioCtx.createGain(); this.vGain = audioCtx.createGain();
                this.o1.type = document.getElementById('wave1').value; this.o1.frequency.setValueAtTime(freq, now);
                this.g1.gain.setValueAtTime(document.getElementById('mix1').value, now);
                this.o2.type = document.getElementById('wave2').value; this.o2.frequency.setValueAtTime(freq, now);
                this.o2.detune.setValueAtTime(12, now);
                this.g2.gain.setValueAtTime(document.getElementById('mix2').value, now);
                this.vGain.gain.setValueAtTime(0, now);
                this.vGain.gain.linearRampToValueAtTime(0.3, now + 0.03);
                this.o1.connect(this.g1); this.o2.connect(this.g2);
                this.g1.connect(this.vGain); this.g2.connect(this.vGain);
                this.vGain.connect(filter);
                this.o1.start(); this.o2.start();
            }
            stop() {
                const now = audioCtx.currentTime;
                const rel = parseFloat(document.getElementById('release').value);
                this.vGain.gain.cancelScheduledValues(now);
                this.vGain.gain.setValueAtTime(this.vGain.gain.value, now);
                this.vGain.gain.exponentialRampToValueAtTime(0.001, now + rel);
                this.o1.stop(now + rel + 0.1); this.o2.stop(now + rel + 0.1);
            }
        }

        function noteOn(note) {
            initAudio();
            const isHold = document.getElementById('holdMode').checked;
            
            if (isHold && heldNotes.has(note)) {
                // HOLD中に同じキーを押したらOFFにする（トグル動作）
                noteOff(note, true);
                return;
            }

            heldNotes.add(note);
            if (!document.getElementById('arpActive').checked) {
                if (!activeVoices.has(note)) {
                    activeVoices.set(note, new Voice(440 * Math.pow(2, (note - 69) / 12)));
                }
            }
            const el = document.querySelector(`[data-note="${note}"]`);
            if(el) el.classList.add('active');
        }

        function noteOff(note, force = false) {
            const isHold = document.getElementById('holdMode').checked;
            if (isHold && !force) return; // HOLD中は何もしない

            heldNotes.delete(note);
            if (!document.getElementById('arpActive').checked) {
                const v = activeVoices.get(note);
                if (v) { v.stop(); activeVoices.delete(note); }
            }
            const el = document.querySelector(`[data-note="${note}"]`);
            if(el) el.classList.remove('active');
        }

        function startArp() {
            if (arpTimer) return;
            arpTimer = setInterval(() => {
                if (heldNotes.size === 0) return;
                const notes = Array.from(heldNotes).sort((a, b) => a - b);
                const mode = document.getElementById('arpMode').value;
                let note;
                if (mode === 'up') note = notes[arpIndex % notes.length];
                else if (mode === 'down') note = notes.reverse()[arpIndex % notes.length];
                else note = notes[Math.floor(Math.random() * notes.length)];
                
                const v = new Voice(440 * Math.pow(2, (note - 69) / 12));
                setTimeout(() => v.stop(), (60000 / document.getElementById('arpBpm').value) * 0.8);
                arpIndex++;
            }, 60000 / document.getElementById('arpBpm').value);
        }

        function stopArp() { clearInterval(arpTimer); arpTimer = null; arpIndex = 0; }

        const kb = document.getElementById('keyboard');
        for (let i = 48; i <= 72; i++) {
            const key = document.createElement('div');
            key.className = [1,3,6,8,10].includes(i % 12) ? 'key black' : 'key';
            key.dataset.note = i;
            key.onmousedown = key.ontouchstart = (e) => { e.preventDefault(); noteOn(i); };
            key.onmouseup = key.onmouseleave = key.ontouchend = () => noteOff(i);
            kb.appendChild(key);
        }
        document.querySelectorAll('input, select').forEach(el => el.oninput = updateParams);
        
        // HOLDスイッチがOFFになった瞬間に、現在押されていない音をすべて止める
        document.getElementById('holdMode').onchange = (e) => {
            if (!e.target.checked) {
                activeVoices.forEach((v, note) => {
                    v.stop();
                    activeVoices.delete(note);
                    const el = document.querySelector(`[data-note="${note}"]`);
                    if(el) el.classList.remove('active');
                });
                heldNotes.clear();
            }
        };

        function drawScope() {
            requestAnimationFrame(drawScope);
            const ctx = document.getElementById('scope').getContext('2d');
            const buf = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(buf);
            ctx.fillStyle = '#010409'; ctx.fillRect(0,0,950,100);
            ctx.lineWidth = 2; ctx.strokeStyle = '#79c0ff';
            ctx.beginPath();
            let x = 0; const s = 950 / buf.length;
            for(let i=0; i<buf.length; i++) {
                const y = (buf[i]/128.0) * 40;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                x += s;
            }
            ctx.stroke();
        }
    </script>
</body>
</html>
