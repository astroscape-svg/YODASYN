<script>
    let audioCtx, masterGain, filter, analyser, delayNode, delayGain, feedbackGain;
    const activeVoices = new Map();
    const heldNotes = new Set();
    let arpTimer = null;
    let arpIndex = 0;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        filter = audioCtx.createBiquadFilter(); filter.type = "lowpass";
        delayNode = audioCtx.createDelay(1.0); feedbackGain = audioCtx.createGain(); delayGain = audioCtx.createGain();
        masterGain = audioCtx.createGain(); analyser = audioCtx.createAnalyser();
        filter.connect(masterGain); filter.connect(delayNode);
        delayNode.connect(feedbackGain); feedbackGain.connect(delayNode);
        delayNode.connect(delayGain); delayGain.connect(masterGain);
        masterGain.connect(analyser); analyser.connect(audioCtx.destination);
        updateParams(); drawScope();
        
        // 【重要】オーディオ初期化時にMIDIも初期化
        initMIDI();
    }

    // --- MIDI接続ロジック (ここが漏れていました) ---
    function initMIDI() {
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure);
        } else {
            console.log("Web MIDI APIはこのブラウザでサポートされていません");
        }
    }

    function onMIDISuccess(midiAccess) {
        const inputs = midiAccess.inputs.values();
        for (let input of inputs) {
            console.log("MIDIデバイスを認識:", input.name);
            input.onmidimessage = getMIDIMessage;
        }
    }

    function onMIDIFailure() {
        console.log("MIDIデバイスにアクセスできませんでした");
    }

    function getMIDIMessage(message) {
        const command = message.data[0];
        const note = message.data[1];
        const velocity = (message.data.length > 2) ? message.data[2] : 0;

        switch (command) {
            case 144: // Note On
                if (velocity > 0) noteOn(note);
                else noteOff(note);
                break;
            case 128: // Note Off
                noteOff(note);
                break;
        }
    }
    // ------------------------------------------

    function updateParams() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        filter.frequency.setTargetAtTime(document.getElementById('cutoff').value, now, 0.05);
        delayNode.delayTime.setTargetAtTime(document.getElementById('delayTime').value, now, 0.05);
        feedbackGain.gain.setTargetAtTime(document.getElementById('delayFb').value, now, 0.05);
        delayGain.gain.setTargetAtTime(document.getElementById('delayMix').value, now, 0.05);
        masterGain.gain.setTargetAtTime(0.5, now, 0.05);
        if(document.getElementById('arpActive').checked) startArp(); else stopArp();
    }

    class Voice {
        constructor(freq) {
            const now = audioCtx.currentTime;
            this.o1 = audioCtx.createOscillator(); this.o2 = audioCtx.createOscillator();
            this.g1 = audioCtx.createGain(); this.g2 = audioCtx.createGain(); this.vGain = audioCtx.createGain();
            this.o1.type = document.getElementById('wave1').value; this.o1.frequency.setValueAtTime(freq, now);
            this.g1.gain.setValueAtTime(document.getElementById('mix1').value, now);
            this.o2.type = document.getElementById('wave2').value; this.o2.frequency.setValueAtTime(freq, now);
            this.o2.detune.setValueAtTime(12, now);
            this.g2.gain.setValueAtTime(document.getElementById('mix2').value, now);
            this.vGain.gain.setValueAtTime(0, now);
            this.vGain.gain.linearRampToValueAtTime(0.3, now + 0.03);
            this.o1.connect(this.g1); this.o2.connect(this.g2);
            this.g1.connect(this.vGain); this.g2.connect(this.vGain);
            this.vGain.connect(filter);
            this.o1.start(); this.o2.start();
        }
        stop() {
            const now = audioCtx.currentTime;
            const rel = parseFloat(document.getElementById('release').value);
            this.vGain.gain.cancelScheduledValues(now);
            this.vGain.gain.setValueAtTime(this.vGain.gain.value, now);
            this.vGain.gain.exponentialRampToValueAtTime(0.001, now + rel);
            this.o1.stop(now + rel + 0.1); this.o2.stop(now + rel + 0.1);
        }
    }

    function noteOn(note) {
        initAudio(); // 鍵盤が押された時にオーディオとMIDIを初期化
        const isHold = document.getElementById('holdMode').checked;
        if (isHold && heldNotes.has(note)) {
            noteOff(note, true);
            return;
        }
        heldNotes.add(note);
        if (!document.getElementById('arpActive').checked) {
            if (!activeVoices.has(note)) {
                activeVoices.set(note, new Voice(440 * Math.pow(2, (note - 69) / 12)));
            }
        }
        const el = document.querySelector(`[data-note="${note}"]`);
        if(el) el.classList.add('active');
    }

    function noteOff(note, force = false) {
        const isHold = document.getElementById('holdMode').checked;
        if (isHold && !force) return;
        heldNotes.delete(note);
        if (!document.getElementById('arpActive').checked) {
            const v = activeVoices.get(note);
            if (v) { v.stop(); activeVoices.delete(note); }
        }
        const el = document.querySelector(`[data-note="${note}"]`);
        if(el) el.classList.remove('active');
    }

    // （以下、Arp/Keyboard生成/Scope描画のロジックは変更なし）
</script>
